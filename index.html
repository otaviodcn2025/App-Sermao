<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fafc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.json" />
    <title>Sermão Digital</title>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        console.error('Erro na aplicação:', msg, url, lineNo, columnNo, error);
        var root = document.getElementById('root');
        if (root && root.innerHTML === '') {
          root.innerHTML = '<div style="padding: 40px; text-align: center; font-family: sans-serif; color: #334155;">' +
            '<h1 style="color: #ef4444; margin-bottom: 16px;">Ocorreu um erro ao carregar</h1>' +
            '<p style="font-size: 14px; margin-bottom: 24px;">' + msg + '</p>' +
            '<button onclick="window.location.reload()" style="background: #0f172a; color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: bold; cursor: pointer;">Recarregar Página</button>' +
            '</div>';
        }
        return false;
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
